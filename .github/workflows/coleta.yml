name: Coleta diária de preços

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 06:00 em Brasília
  workflow_dispatch:        # permite rodar manualmente pela aba Actions
  push:
    branches: [main]
    paths: [produtos.json, coletor.py]  # coleta na hora quando um produto é adicionado/editado

permissions:
  contents: write

concurrency:
  group: coleta
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Coletar preços
        id: coleta
        continue-on-error: true
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
        run: |
          set -o pipefail
          python coletor.py 2>&1 | tee coleta.log

      - name: Salvar histórico e log
        run: |
          git config user.name "price-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nada novo para salvar."
          else
            git commit -m "coleta: $(TZ=America/Sao_Paulo date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi

      - name: Sinalizar falha da coleta
        if: steps.coleta.outcome == 'failure'
        run: exit 1

name: Coleta diária de preços

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 06:00 em Brasília
  workflow_dispatch:        # permite rodar manualmente pela aba Actions
  push:
    branches: [main]
    paths: [produtos.json]  # coleta na hora quando um produto é adicionado/editado

permissions:
  contents: write

concurrency:
  group: coleta
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Coletar preços
        run: python coletor.py

      - name: Salvar histórico
        run: |
          git config user.name "price-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.csv
          if git diff --cached --quiet; then
            echo "Nada novo para salvar."
          else
            git commit -m "coleta: $(TZ=America/Sao_Paulo date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi
